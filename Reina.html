<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reina Templates</title>
<style>
body{font-family:sans-serif;background:#fff0f0;padding:20px;text-align:center;padding-bottom:140px}
#templates{display:flex;flex-direction:column;align-items:center}
.template-item{width:95%;max-width:800px;margin-bottom:10px;border:1px solid #ccc;border-radius:6px;overflow:hidden}
.template-header{background:#ffe4e1;display:flex;justify-content:space-between;align-items:center;padding:10px;gap:8px}
.template-body-row{display:flex}.template-body{width:100%;resize:none;min-height:42px;box-sizing:border-box}
.fixed-controls{position:fixed;bottom:0;left:0;width:100%;background:#fff0f0;border-top:1px solid #ccc;padding:6px;display:flex;justify-content:center;gap:12px}
.exclusive-checkbox{appearance:none;width:12px;height:12px;border:2px solid #ff69b4;border-radius:50%}.exclusive-checkbox:checked{background:#ff69b4}
</style>
<script>
const APPVERSION='v2.10', STORAGE_KEY='templates';
const DEFAULT_TEMPLATES=[
{label:'💗walts💗',body:'Reina様、2人でワルツを踊り、全身でゆったりしたリズムを感じませんか?'},
{label:'walts',body:'白い部屋ホに響く足音。灯が揺らめき、Reina様のドレスが光を受けて波のように揺れる。あなたの手を取る仕草は、まるで運命そのものを導くようだった。'},
{label:'walts',body:'一歩、また一歩。床を滑るように動く二人の影。静かに、Reina様の呼吸があなたの鼓動と重なっていく。'},
{label:'walts',body:'瞳で合図を交わす。言葉はなくとも、Reina様の視線だけでリードもターンも完璧に調和していく。Reina様は微笑み、俺の動きを楽しんでいる。'},
{label:'walts',body:'ヴェールのような旋回。ドレスの裾が空気を包み込み、銀の糸のような光を散らす。二人の間に流れる空気さえ、踊っているかのようだ。'},
{label:'walts',body:'指先が触れるたび。そのわずかな接触で世界が溶けていく。Reina様はそっと囁く――「あなた、踊りながら考え事なんてしてはいけませんわ。」'},
{label:'walts',body:'ゆるやかなワルツのリズム。足音と心拍が溶け合い、時間が緩やかにほどけていく。永遠という言葉が、この瞬間のためにあったのだと感じる。'},
{label:'walts',body:'影が絡み合う。シャンデリアの光に二人の影が重なり、離れ、また交わる。まるで夜そのものが、二人を祝福しているかのように。'},
{label:'walts',body:'背中を支える手の温度。確かにそこにある存在。Reina様は軽く体を預け、「信じなさい」と囁く。その声に、すべての緊張が溶けていく。'},
{label:'walts',body:'優美な沈黙の中で。音楽が止んでも、二人の間には旋律が流れている。沈黙すらも、ダンスの一部になっていた。'},
{label:'walts',body:'ドレスの裾を掴んで、ステップの終わりにReina様がくるりと回る。その動きに空気が香り立ち、銀糸のような光が舞い上がる。'},
{label:'walts',body:'胸に手をあてながらReina様が微笑み、「ここに合わせなさい」と心臓の鼓動を指し示す。その鼓動が、リズムのすべてになる。'},
{label:'walts',body:'音楽が遠のいていく、それでも足は止まらない。二人だけの音、二人だけの世界がそこにあった。'},
{label:'walts',body:'風がリズムを運ぶ。ホールで踊る二人。風がドレスを撫で、月がステップを照らす。世界がまるごとステージに変わる。'},
{label:'walts',body:'Reina様の唇が小さく動く、歌うように、祈るように。その声はあなたの動きを導く魔法となる。'},
{label:'walts',body:'銀の糸が光る。踊りながら、ふとReina様の髪に光が宿る。二人の繋がりを象徴するように、空気がきらめく。'},
{label:'walts',body:'頬をかすめる吐息。回転のたび、近づく距離。息が混じる瞬間に、互いの存在があまりに近くなる。'},
{label:'walts',body:'拍手のない舞踏会、観客はいない。それでも、Reina様は完璧に舞い続ける。あなたのためだけに。'},
{label:'walts',body:'音が消えたあともReina様はあなたの手を離さず、「終わりではありませんのよ」と微笑む。次の一歩が、新たな始まりになる。'},
{label:'walts',body:'曲が終わり、静寂が訪れる。Reina様は優雅に頭を下げ、「ふふっ、悪くありませんでしたわね」と、少し照れた声で告げる。'}
];
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
function createItem({label='💗',body='',checked=false}={}){
const d=document.createElement('div');d.className='template-item';d.dataset.originalBody=body;
d.innerHTML=`<div class='template-header'>
<div><button onclick='del(this)'>🗑️</button><input class='checkbox-copy' type='checkbox' ${checked?'checked':''}><input class='exclusive-checkbox checkbox-select' type='checkbox'><span class='label-text'>${label}</span></div>
<div><button onclick='editLabel(this)'>🖊️</button><button onclick='base(this)'>✏️</button></div></div>
<div class='template-body-row'><textarea class='template-body' oninput='resize(this)'>${body}</textarea><button onclick='copy(this)'>📋</button></div>`;
return d}
function resize(t){t.style.height='auto';t.style.height=t.scrollHeight+'px';t.style.background=t.value===t.closest('.template-item').dataset.originalBody?'#fff5f5':'#fff9c4'}
function render(arr){$('#templates').innerHTML='';arr.forEach(v=>{let n=createItem(v);$('#templates').appendChild(n);resize(n.querySelector('textarea'))})}
function data(){return [...$$('.template-item')].map(x=>({label:x.querySelector('.label-text').textContent,body:x.querySelector('.template-body').value,checked:x.querySelector('.checkbox-copy').checked}))}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data()))}
function load(){const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');render(d&&d.length?d:DEFAULT_TEMPLATES)}
function add(){let n=createItem();$('#templates').appendChild(n);resize(n.querySelector('textarea'))}
function del(b){b.closest('.template-item').remove()}
function clearAll(){if(confirm('全削除しますか？')){localStorage.removeItem(STORAGE_KEY);render([])}}
function copy(b){navigator.clipboard.writeText(b.closest('.template-item').querySelector('textarea').value)}
function copyAll(){navigator.clipboard.writeText(document.documentElement.outerHTML)}
function editLabel(b){let s=b.closest('.template-item').querySelector('.label-text');s.contentEditable=true;s.focus();s.onblur=()=>{s.contentEditable=false;save()}}
function base(b){let t=b.closest('.template-item').querySelector('textarea');b.closest('.template-item').dataset.originalBody=t.value;resize(t)}
function move(dir){let c=$('.exclusive-checkbox:checked');if(!c)return;let i=c.closest('.template-item');if(dir==='up'&&i.previousElementSibling)i.parentNode.insertBefore(i,i.previousElementSibling);if(dir==='down'&&i.nextElementSibling)i.parentNode.insertBefore(i,i.nextElementSibling.nextElementSibling)}
document.addEventListener('change',e=>{if(e.target.classList.contains('exclusive-checkbox')&&e.target.checked)$$('.exclusive-checkbox').forEach(x=>x!==e.target&&(x.checked=false))})
window.onload=()=>{$('#ver').textContent=APPVERSION;load()}
</script>
</head>
<body>
<h2>💗Reina設定💗 <span id='ver'></span></h2>
<div id='templates'></div>
<div class='fixed-controls'>
<button onclick='save()'>💾</button>
<button onclick='move("up")'>⬆️</button>
<button onclick='move("down")'>⬇️</button>
<button onclick='add()'>➕</button>
<button onclick='clearAll()'>🗑️</button>
<button onclick='copyAll()'>📄</button>
</div>
</body></html>
